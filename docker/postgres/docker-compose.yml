version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: silver_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: silver
      POSTGRES_PASSWORD: silver
      POSTGRES_DB: silversip
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: